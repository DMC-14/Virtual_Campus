<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Building Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #eceff1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }
        /* The 3D Canvas viewport */
        model-viewer {
            width: 100%;
            flex-grow: 1;
            background-color: #ffffff;
            --poster-color: transparent;
        }
        /* Neat UI Overlay Panel */
        .ui-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(4px);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button {
            padding: 10px 16px;
            border: none;
            background-color: #0288d1;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #01579b;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="buildingViewer"
        src="https://raw.githubusercontent.com/Atlas395/3D-Assets/main/building.glb"
        camera-controls
        auto-rotate
        ar
        ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1.5"
        shadow-softness="0.8"
        exposure="1.2"
        alt="Interactive 3D view of a building asset exported from Blender">
    </model-viewer>

    <div class="ui-panel">
        <button id="toggleRotation">Pause Rotation</button>
        <button id="resetCam">Reset View</button>
    </div>

    <script>
        const viewer = document.getElementById('buildingViewer');
        const rotateBtn = document.getElementById('toggleRotation');
        const resetBtn = document.getElementById('resetCam');

        // Toggle auto-rotation feature
        rotateBtn.addEventListener('click', () => {
            if (viewer.hasAttribute('auto-rotate')) {
                viewer.removeAttribute('auto-rotate');
                rotateBtn.innerText = "Start Rotation";
            } else {
                viewer.setAttribute('auto-rotate', '');
                rotateBtn.innerText = "Pause Rotation";
            }
        });

        // Reset the camera back to its default viewing angle
        resetBtn.addEventListener('click', () => {
            viewer.cameraOrbit = "0deg 75deg auto";
            viewer.cameraTarget = "auto auto auto";
        });
    </script>
</body>
</html>
